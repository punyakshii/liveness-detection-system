<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #1e3c72;
            font-family: Arial;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>🔐 Login to Access System</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>

    <p style="color:red;">{{ error }}</p>

</body>
</html>
